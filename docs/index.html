<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Documentation</title>
    <script>
        (function () {
            var defaultLang = "en";

            // 检测用户语言
            var userLang = navigator.language || navigator.userLanguage;
            var targetLang = defaultLang;
            if (userLang && userLang.toLowerCase().startsWith("zh")) {
                targetLang = "zh";
            }

            // 获取当前路径
            var currentUrl = window.location.href;

            // 兼容 file:// 和 http(s)://
            var newPath;
            if (currentUrl.toLowerCase().startsWith("file://")) {
                newPath = targetLang + "/index.html";
                window.location.href = newPath;
            } else {
                var urlObject = new URL(currentUrl);
                var pathname = urlObject.pathname;

                if (!pathname.endsWith('/')) {
                    pathname = pathname.substring(0, pathname.lastIndexOf('/') + 1);
                }
                if (!pathname.endsWith('/')) {
                    pathname += '/';
                }

                newPath = pathname + targetLang + "/";
                var newUrl = urlObject.origin + newPath;
                window.location.href = newUrl;
            }
        })();
    </script>
</head>

<body>
    <p>Redirecting to the documentation... <a id="link" href="#">Click here if not redirected</a></p>
    <script>
        // 给链接加上跳转路径
        var link = document.getElementById("link");
        link.href = (navigator.language || navigator.userLanguage).toLowerCase().startsWith("zh") ? "zh/index.html" : "en/index.html";
    </script>
</body>

</html>
